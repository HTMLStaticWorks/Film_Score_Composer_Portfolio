<svg width="320" height="64" viewBox="0 0 320 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Waveform icon: 5 bars, varying heights, rounded tops, single gold fill -->
  <g fill="#C8A96E">
    <rect x="0"  y="22" width="6" height="20" rx="3"/>
    <rect x="12" y="12" width="6" height="40" rx="3"/>
    <rect x="24" y="4"  width="6" height="56" rx="3"/>
    <rect x="36" y="16" width="6" height="32" rx="3"/>
    <rect x="48" y="26" width="6" height="12" rx="3"/>
  </g>

  <!-- Wordmark: CineTone, serif, single gold fill, vertically centered with icon -->
  <text x="72" y="44"
        font-family="'Cormorant Garamond', Georgia, 'Times New Roman', serif"
        font-size="38"
        font-weight="580"
        letter-spacing="1.5"
        fill="#C8A96E">CineTone</text>
</svg>
